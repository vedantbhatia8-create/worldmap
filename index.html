<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Destination Relaxation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{
  --paper:#F3E6C4; --paper-2:#EFDFB6; --paper-3:#F8F0D9;
  --ocean:#A9D2CA; --land:#EFD49B; --border:#B6923B;
  --ink:#36301E; --ink-soft:#6E5F38; --ink-faint:#9A8a53;
  --rule:#DCC78F; --rule-soft:#E7D7A9;
  --teal:#147a68; --terra:#CB561F; --pin:#C0392B; --gold:#D9A327;
  --serif:"Marcellus",Georgia,serif; --sans:"Hanken Grotesk",system-ui,sans-serif;
  --shadow:0 18px 50px -22px rgba(58,51,34,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--paper);
  -webkit-font-smoothing:antialiased;overflow:hidden}
#root{height:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

.app{display:grid;grid-template-columns:1fr 0px;height:100vh;width:100vw;overflow:hidden}
.app.has-panel{grid-template-columns:1fr 440px}
@media(max-width:900px){.app.has-panel{grid-template-columns:1fr 360px}}
.stage{position:relative;min-width:0;display:flex;flex-direction:column;
  background:
    radial-gradient(120% 90% at 50% 8%, var(--paper-3), var(--paper) 55%, var(--paper-2));
}

/* ── Topbar ── */
.topbar{position:absolute;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;
  justify-content:space-between;gap:24px;padding:20px 26px;
  background:linear-gradient(180deg, rgba(243,230,196,.98) 60%, rgba(243,230,196,0));pointer-events:none}
.topbar>*{pointer-events:auto}
.brand{display:flex;align-items:center;gap:13px}
.brand-mark{width:42px;height:42px;flex:none}
.brand-mark svg{width:100%;height:100%}
.brand-name{font-family:var(--serif);font-size:21px;letter-spacing:.3px;color:var(--ink);line-height:1}
.brand-tag{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-top:5px}

/* ── Search ── */
.search{position:relative;width:340px;max-width:42vw}
.search-ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--ink-faint)}
.search input{width:100%;height:46px;padding:0 16px 0 42px;font-family:var(--sans);font-size:14.5px;
  color:var(--ink);background:rgba(247,241,224,.96);border:1px solid var(--border);border-radius:23px;
  box-shadow:0 6px 20px -12px rgba(58,51,34,.5);outline:none;transition:border-color .2s,box-shadow .2s}
.search input::placeholder{color:var(--ink-faint)}
.search input:focus{border-color:var(--teal);box-shadow:0 6px 22px -10px rgba(47,110,99,.45)}
.ac{position:absolute;top:54px;left:0;right:0;background:var(--paper-3);border:1px solid var(--border);
  border-radius:16px;box-shadow:var(--shadow);overflow:hidden;list-style:none;padding:6px}
.ac-item{display:flex;align-items:baseline;gap:8px;padding:10px 13px;border-radius:11px;cursor:pointer}
.ac-item.hi{background:rgba(47,110,99,.12)}
.ac-name{font-family:var(--serif);font-size:15.5px;color:var(--ink)}
.ac-country{font-size:12px;color:var(--ink-faint);margin-left:auto}

/* ── Map ── */
.map-wrap{position:relative;flex:1;min-height:0;display:flex}
.worldmap{width:100%;height:100%;cursor:crosshair;touch-action:none}
.worldmap.picking{cursor:progress}
.worldmap:active{cursor:grabbing}
.city-dot{cursor:pointer}
.city-label{font-family:var(--serif);fill:var(--ink);paint-order:stroke;stroke:rgba(247,241,224,.85);
  stroke-width:.9px;pointer-events:none}
.sel-pulse{fill:rgba(192,57,43,.24);transform-origin:center;animation:pulse 2.4s ease-out infinite}
@keyframes pulse{0%{transform:scale(.4);opacity:.7}70%{opacity:0}100%{transform:scale(1.6);opacity:0}}
.sel-marker{animation:drop .5s cubic-bezier(.2,1.1,.3,1)}
@keyframes drop{0%{transform:translateY(-16px) scale(.6);opacity:0}100%{opacity:1}}

.map-tip{position:absolute;top:50%;left:50%;transform:translate(-50%,-160%);pointer-events:none;
  background:var(--ink);color:var(--paper-3);padding:5px 11px;border-radius:8px;font-size:12px;display:none}

.map-ctrls{position:absolute;right:20px;bottom:24px;display:flex;flex-direction:column;gap:1px;
  border:1px solid var(--border);border-radius:13px;overflow:hidden;box-shadow:var(--shadow);background:var(--border)}
.map-ctrls button{width:40px;height:40px;background:var(--paper-3);font-size:20px;line-height:1;color:var(--ink-soft);
  display:flex;align-items:center;justify-content:center;transition:background .15s}
.map-ctrls button:hover{background:#fff}
.ctrl-reset{font-size:16px!important}

.compass{position:absolute;left:22px;bottom:20px;opacity:.9;pointer-events:none}
.compass-n{font-family:var(--serif);font-size:13px;fill:var(--pin)}

/* ── Leaflet overrides ── */
.map-canvas{width:100%;height:100%}
.leaflet-container{cursor:crosshair;font-family:var(--sans)}
.leaflet-container.picking{cursor:progress}
.leaflet-container:active{cursor:grabbing}
.leaflet-attribution-flag{display:none!important}
.pin-icon{background:none!important;border:none!important;display:flex;align-items:flex-end;position:relative}
.pin-pulse{position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:34px;height:34px;border-radius:50%;background:rgba(192,57,43,.22);
  animation:pulse 2.4s ease-out infinite;pointer-events:none}
@keyframes pulse{0%{transform:translateX(-50%) scale(.3);opacity:.8}70%{opacity:0}100%{transform:translateX(-50%) scale(1.5);opacity:0}}

.hint{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);z-index:10;
  background:rgba(247,241,224,.94);border:1px solid var(--border);border-radius:22px;padding:10px 20px;
  font-size:13.5px;color:var(--ink-soft);box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;
  animation:fadeUp .6s ease both}
.hint-k{font-family:var(--serif);color:var(--ink)}
.hint-pin{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--pin);border:1px solid var(--paper-3)}
@keyframes fadeUp{from{transform:translate(-50%,12px)}to{transform:translate(-50%,0)}}

.loading-map,.resolve{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;
  display:flex;align-items:center;gap:11px;font-family:var(--serif);font-size:18px;color:var(--ink-soft)}
.resolve{top:auto;bottom:30px;font-size:14px;background:rgba(247,241,224,.95);padding:10px 18px;border-radius:22px;
  border:1px solid var(--border);box-shadow:var(--shadow)}
.lm-dot{width:11px;height:11px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 0 rgba(47,110,99,.5);
  animation:ping 1.3s ease-out infinite}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(47,110,99,.5)}100%{box-shadow:0 0 0 12px rgba(47,110,99,0)}}

.toast{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:40;
  background:var(--ink);color:var(--paper-3);padding:11px 20px;border-radius:22px;font-size:13.5px;
  box-shadow:var(--shadow);animation:fadeUp .35s ease both}

/* ── Panel ── */
.panel{min-width:0;overflow:hidden;background:var(--paper-3);
  border-left:1px solid var(--border)}
.panel-inner{width:440px;height:100%;display:flex;flex-direction:column;position:relative;
  animation:panelIn .45s cubic-bezier(.4,0,.2,1) both}
@keyframes panelIn{from{transform:translateX(34px)}to{transform:translateX(0)}}
@media(max-width:900px){.panel-inner{width:360px}}
.panel-close{position:absolute;top:18px;right:18px;z-index:5;width:32px;height:32px;border-radius:50%;
  background:var(--paper-2);color:var(--ink-soft);font-size:13px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--rule);transition:background .15s}
.panel-close:hover{background:#fff}

.panel-head{padding:30px 30px 18px;border-bottom:1px solid var(--rule-soft);
  background:linear-gradient(180deg, var(--paper-2), var(--paper-3))}
.panel-kicker{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--terra);font-weight:600}
.panel-title{font-family:var(--serif);font-size:34px;line-height:1.04;margin:8px 0 6px;color:var(--ink);
  letter-spacing:.2px;text-wrap:balance}
.panel-sub{font-size:13px;color:var(--ink-faint);letter-spacing:.02em}

.tabs{display:flex;gap:4px;padding:14px 24px 0;background:var(--paper-3);border-bottom:1px solid var(--rule-soft)}
.tab{position:relative;padding:10px 14px 13px;font-size:13.5px;font-weight:600;color:var(--ink-faint);
  letter-spacing:.02em;transition:color .2s;white-space:nowrap}
.tab.active{color:var(--ink)}
.tab-rule{position:absolute;left:14px;right:14px;bottom:-1px;height:2.5px;border-radius:2px;
  transform:scaleX(0);transform-origin:center;transition:transform .25s}
.tab.active .tab-rule{transform:scaleX(1)}
.tab-rule.food{background:var(--terra)}
.tab-rule.attr{background:var(--teal)}

.panel-scroll{flex:1;overflow-y:auto;padding:18px 22px 8px}
.panel-scroll::-webkit-scrollbar{width:9px}
.panel-scroll::-webkit-scrollbar-thumb{background:var(--rule);border-radius:8px;border:2px solid var(--paper-3)}
.list-cap{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);
  margin:2px 8px 10px}
.rlist{list-style:none;display:flex;flex-direction:column;gap:6px}

.ritem{display:flex;flex-direction:column;border-radius:14px;transition:background .15s;overflow:hidden}
.ritem:hover,.ritem.ritem-open{background:var(--paper-2)}
.ritem-main{display:flex;gap:14px;padding:13px 10px}
.thumb{position:relative;flex:none;width:66px;height:66px;border-radius:12px;overflow:hidden;
  box-shadow:inset 0 0 0 1px rgba(58,51,34,.12), 0 4px 12px -8px rgba(58,51,34,.6);
  display:flex;align-items:center;justify-content:center}
.thumb-ic{width:30px;height:30px;opacity:.92}
.thumb-rank{position:absolute;top:4px;left:5px;font-family:var(--serif);font-size:12px;color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.4);line-height:1}
.ritem-body{flex:1;min-width:0}
.ritem-name{font-family:var(--serif);font-size:17.5px;font-weight:400;color:var(--ink);line-height:1.15;
  letter-spacing:.1px}
.ritem-cat{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--terra);margin:3px 0 6px;font-weight:600}
.ritem-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-soft)}
.dot-sep{color:var(--ink-faint)}
.stars{display:inline-flex;align-items:center;gap:5px}
.stars-svg{width:62px;height:12.4px}
.stars-num{font-weight:600;color:var(--ink)}
.price b{color:var(--ink);letter-spacing:1px}
.price-dim{color:var(--ink-faint);letter-spacing:1px}
.price.free{color:var(--teal);font-weight:600;font-size:12px}
.dist{color:var(--ink-soft);white-space:nowrap}
.ritem-blurb{font-size:13px;line-height:1.45;color:var(--ink-soft);margin-top:7px;text-wrap:pretty}

.panel-foot{text-align:center;font-size:11px;color:var(--ink-faint);letter-spacing:.04em;padding:18px 0 22px;font-style:italic}
.panel-empty{padding:30px 14px;text-align:center;color:var(--ink-soft);font-size:14px;line-height:1.5}

/* ── Account page ── */
.account-page{height:100vh;background:var(--paper);display:flex;flex-direction:column;overflow:hidden}
.account-topbar{flex:none;display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;background:rgba(243,230,196,.98);border-bottom:1px solid var(--rule)}
.account-back{font-size:13px;color:var(--ink-soft);text-decoration:none;font-weight:500;
  transition:color .15s;width:110px}
.account-back:hover{color:var(--ink)}
.account-topbar-title{font-family:var(--serif);font-size:17px;color:var(--ink)}
.account-topbar-spacer{width:110px}
.account-main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px;overflow-y:auto}
.account-card{position:relative;background:var(--paper-3);border:1px solid var(--rule-soft);
  border-radius:28px;padding:44px 44px 36px;max-width:420px;width:100%;text-align:center;
  box-shadow:0 20px 50px -20px rgba(58,51,34,.3)}
.account-avatar{width:88px;height:88px;border-radius:50%;border:3px solid var(--border);
  object-fit:cover;display:block;margin:0 auto 16px}
.account-name{font-family:var(--serif);font-size:26px;color:var(--ink);margin-bottom:5px}
.account-email{font-size:13px;color:var(--ink-faint);margin-bottom:26px}
.account-stats{display:flex;align-items:stretch;margin-bottom:28px;
  background:var(--paper-2);border:1px solid var(--rule-soft);border-radius:16px;overflow:hidden}
.account-stat{flex:1;padding:16px 10px}
.account-stat-div{width:1px;background:var(--rule-soft);flex:none}
.ast-num{font-family:var(--serif);font-size:26px;color:var(--ink);line-height:1;margin-bottom:5px}
.ast-num.ast-small{font-size:14px;padding-top:5px}
.ast-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
.account-actions{display:flex;flex-direction:column;gap:10px}
.account-admin-btn{display:block;padding:12px 20px;background:var(--ink);color:var(--paper-3);
  border-radius:14px;text-decoration:none;font-size:14px;font-weight:600;
  font-family:var(--sans);transition:opacity .15s}
.account-admin-btn:hover{opacity:.82}
.account-signout-btn{padding:12px 20px;border:1.5px solid var(--rule);border-radius:14px;
  background:transparent;color:var(--ink-soft);font-size:14px;font-weight:500;cursor:pointer;
  font-family:var(--sans);transition:background .15s,color .15s}
.account-signout-btn:hover{background:var(--paper-2);color:var(--ink)}

/* ── User badge (anchor) ── */
.user-badge{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid var(--border);
  padding:0;flex:none;transition:opacity .2s;cursor:pointer;display:block}
.user-badge:hover{opacity:.8}
.user-badge img{width:100%;height:100%;object-fit:cover;display:block}

/* ── Login overlay ── */
.login-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  background:
    radial-gradient(ellipse 70% 55% at 18% 18%, rgba(232,214,162,.75), transparent),
    radial-gradient(ellipse 65% 60% at 82% 82%, rgba(218,196,138,.65), transparent),
    radial-gradient(ellipse 100% 100% at 50% 50%, var(--paper-3), var(--paper-2))}
.login-vignette{position:absolute;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 80% at 50% 50%, transparent 38%, rgba(36,30,18,.22))}
.lm{position:absolute;pointer-events:none;user-select:none;z-index:1}
.lm-compass{top:4%;left:2%;animation:float1 9s ease-in-out infinite}
.lm-ship{top:3%;right:2%;animation:float2 12s ease-in-out infinite}
.lm-balloon{bottom:9%;left:3%;animation:float3 10s ease-in-out infinite;animation-delay:-3.5s}
.lm-palm{bottom:4%;right:2%;animation:float1 11s ease-in-out infinite;animation-delay:-5s}
.lm-plane{top:10%;left:36%;animation:drift 16s ease-in-out infinite;animation-delay:-2s}
.lm-anchor{top:36%;right:3%;animation:float2 13s ease-in-out infinite;animation-delay:-4.5s}
.lm-scope{bottom:30%;left:1%;animation:float3 14s ease-in-out infinite;animation-delay:-7s}
@keyframes float1{0%,100%{transform:translateY(0) rotate(0deg)}35%{transform:translateY(-14px) rotate(2.5deg)}70%{transform:translateY(8px) rotate(-1.5deg)}}
@keyframes float2{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(16px) rotate(-3deg)}}
@keyframes float3{0%,100%{transform:translateY(0) rotate(0deg)}40%{transform:translateY(-10px) rotate(4deg)}72%{transform:translateY(7px) rotate(-2.5deg)}}
@keyframes drift{0%,100%{transform:translateX(0)}50%{transform:translateX(28px)}}
@keyframes twinkle{0%,100%{opacity:.38;transform:scale(1)}50%{opacity:.7;transform:scale(1.2)}}

.login-card{position:relative;display:flex;flex-direction:column;align-items:center;gap:16px;
  background:rgba(248,240,217,.97);border:1px solid rgba(182,146,59,.5);border-radius:28px;
  padding:50px 54px;box-shadow:0 24px 60px -20px rgba(58,51,34,.45),0 0 0 1px rgba(182,146,59,.15);
  max-width:390px;width:90%;text-align:center;z-index:2;
  backdrop-filter:blur(8px)}
/* Corner ornaments */
.lcc{position:absolute;width:24px;height:24px;border-color:rgba(182,146,59,.5);border-style:solid}
.lcc-tl{top:14px;left:14px;border-width:2px 0 0 2px;border-radius:2px 0 0 0}
.lcc-tr{top:14px;right:14px;border-width:2px 2px 0 0;border-radius:0 2px 0 0}
.lcc-bl{bottom:14px;left:14px;border-width:0 0 2px 2px;border-radius:0 0 0 2px}
.lcc-br{bottom:14px;right:14px;border-width:0 2px 2px 0;border-radius:0 0 2px 0}
.login-logo{margin-bottom:2px}
.login-title{font-family:var(--serif);font-size:29px;color:var(--ink);letter-spacing:.3px;line-height:1.1}
.login-sub{font-size:12.5px;color:var(--ink-faint);letter-spacing:.1em;text-transform:uppercase;margin-top:-4px}
.login-ornament{margin:2px 0 4px;display:flex;align-items:center;justify-content:center}
.login-error{font-size:12.5px;color:var(--terra);margin-top:4px}

/* ── Map canvas vintage filter ── */
.map-canvas{filter:sepia(18%) saturate(88%) hue-rotate(-4deg) brightness(97%)}

/* ── Admin button ── */
.admin-btn{font-family:var(--sans);font-size:12.5px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;text-decoration:none;color:var(--ink-soft);
  background:rgba(247,241,224,.92);border:1px solid var(--border);border-radius:20px;
  padding:8px 16px;transition:background .15s,color .15s;white-space:nowrap}
.admin-btn:hover{background:var(--paper-3);color:var(--ink)}

/* ── Admin page ── */
.admin-page{height:100vh;background:var(--paper);display:flex;flex-direction:column;overflow:hidden}
.admin-topbar{flex:none;display:flex;align-items:center;justify-content:space-between;gap:20px;
  padding:18px 32px;background:rgba(243,230,196,.98);border-bottom:1px solid var(--rule);z-index:10}
.admin-topbar-right{display:flex;align-items:center;gap:16px}
.admin-back-btn{font-size:13px;font-weight:500;color:var(--ink-soft);text-decoration:none;
  padding:7px 16px;border:1px solid var(--rule);border-radius:20px;background:transparent;
  transition:background .15s,color .15s}
.admin-back-btn:hover{background:var(--paper-3);color:var(--ink)}
.admin-refresh-btn{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft);
  padding:7px 14px;border:1px solid var(--rule);border-radius:20px;background:transparent;
  cursor:pointer;transition:background .15s;font-family:var(--sans)}
.admin-refresh-btn:hover:not(:disabled){background:var(--paper-3)}
.admin-refresh-btn:disabled{opacity:.5;cursor:wait}
.refresh-ic{font-size:16px;line-height:1;display:inline-block;transition:transform .3s}
.refresh-ic.spinning{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.refresh-time{font-size:11.5px;color:var(--ink-faint)}
.admin-scroll{flex:1;overflow-y:auto;padding:0}
.admin-scroll::-webkit-scrollbar{width:9px}
.admin-scroll::-webkit-scrollbar-thumb{background:var(--rule);border-radius:8px;border:2px solid var(--paper)}
.admin-main{max-width:920px;width:100%;margin:0 auto;padding:44px 32px 80px}
.admin-hero{margin-bottom:40px}
.admin-hero-tag{display:inline-block;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--terra);font-weight:600;margin-bottom:8px}
.admin-hero-title{font-family:var(--serif);font-size:44px;color:var(--ink);letter-spacing:.3px;line-height:1;margin-bottom:8px}
.admin-hero-sub{font-size:15px;color:var(--ink-soft)}
.admin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:44px}
.admin-stat-card{background:var(--paper-3);border:1px solid var(--rule-soft);border-radius:18px;
  padding:22px 20px 18px;text-align:center;box-shadow:0 4px 16px -10px rgba(58,51,34,.2)}
.asc-num{font-family:var(--serif);font-size:42px;color:var(--ink);line-height:1;margin-bottom:6px}
.asc-num.asc-red{color:var(--terra)}
.asc-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
.admin-section{margin-bottom:48px}
.admin-section-title{font-family:var(--serif);font-size:20px;color:var(--ink);margin-bottom:18px;
  padding-bottom:10px;border-bottom:1px solid var(--rule-soft)}
.admin-loading,.admin-empty{color:var(--ink-faint);font-size:13.5px;padding:14px 0;font-style:italic}
.admin-table-wrap{border:1px solid var(--rule-soft);border-radius:16px;overflow:hidden}
.admin-table{width:100%;border-collapse:collapse;font-size:13.5px}
.admin-table thead{background:var(--paper-2)}
.admin-table th{text-align:left;padding:12px 16px;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:600;border-bottom:1px solid var(--rule-soft)}
.admin-table td{padding:11px 16px;border-bottom:1px solid var(--rule-soft);color:var(--ink-soft);vertical-align:middle}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:hover td{background:rgba(243,230,196,.5)}
.admin-table-user{display:flex;align-items:center;gap:10px}
.admin-table-name{font-weight:500;color:var(--ink)}
.admin-table-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;flex:none;border:1px solid var(--rule)}
.admin-table-email{color:var(--ink-soft);font-size:12.5px}
.admin-table-num{font-family:var(--serif);font-size:16px;color:var(--ink)}
.admin-table-date{font-size:12px;white-space:nowrap;color:var(--ink-faint)}
.admin-status-badge{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;border:1px solid}
.admin-status-badge.active{color:var(--teal);background:rgba(20,122,104,.08);border-color:rgba(20,122,104,.25)}
.admin-status-badge.banned{color:var(--terra);background:rgba(203,86,31,.08);border-color:rgba(203,86,31,.28)}
.row-banned td{opacity:.55}
.admin-ban-btn{font-size:12px;font-weight:600;padding:5px 13px;border-radius:12px;border:1.5px solid;
  cursor:pointer;background:transparent;transition:background .15s;font-family:var(--sans)}
.admin-ban-btn:not(.unban){color:var(--terra);border-color:rgba(203,86,31,.4)}
.admin-ban-btn:not(.unban):hover{background:rgba(203,86,31,.1)}
.admin-ban-btn.unban{color:var(--teal);border-color:rgba(20,122,104,.4)}
.admin-ban-btn.unban:hover{background:rgba(20,122,104,.1)}
.admin-ban-btn:disabled{opacity:.4;cursor:wait}
.admin-reviews{display:flex;flex-direction:column;gap:10px}
.admin-review-item{background:var(--paper-3);border:1px solid var(--rule-soft);border-radius:14px;padding:14px 18px}
.ari-header{display:flex;align-items:center;gap:10px;margin-bottom:5px;flex-wrap:wrap}
.ari-place{font-family:var(--serif);font-size:15px;color:var(--ink);flex:1;min-width:0}
.ari-city{font-family:var(--sans);font-size:12px;color:var(--ink-faint);font-weight:400}
.ari-stars{color:var(--gold);font-size:11.5px;letter-spacing:1px;flex:none}
.ari-date{font-size:11px;color:var(--ink-faint);flex:none}
.ari-text{font-size:13px;color:var(--ink-soft);line-height:1.5;margin-bottom:6px;font-style:italic}
.ari-user{font-size:11.5px;color:var(--ink-faint)}

/* ── Per-restaurant reviews ── */
.ritem-review-btn{font-size:12px;color:var(--teal);background:none;border:none;cursor:pointer;
  padding:4px 0 0;text-align:left;font-family:var(--sans);letter-spacing:.02em;
  transition:opacity .15s;display:inline-block}
.ritem-review-btn:hover{opacity:.7}
.rr-panel{padding:0 10px 14px 94px;border-top:1px solid var(--rule-soft);margin-top:-2px}
.rr-loading{font-size:12.5px;color:var(--ink-faint);font-style:italic;padding:10px 0}
.rr-empty{font-size:12.5px;color:var(--ink-faint);font-style:italic;margin:8px 0 12px}
.rr-list{display:flex;flex-direction:column;gap:8px;margin:10px 0 14px}
.rr-item{background:var(--paper-3);border:1px solid var(--rule-soft);border-radius:10px;padding:9px 12px}
.rr-item-header{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.rr-stars{color:var(--gold);font-size:11px;letter-spacing:.5px;flex:none}
.rr-user{font-size:12px;color:var(--ink-soft);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rr-date{font-size:11px;color:var(--ink-faint);flex:none}
.rr-text{font-size:12.5px;color:var(--ink);line-height:1.45}
.rr-form{background:var(--paper-3);border:1px solid var(--rule-soft);border-radius:12px;padding:13px 14px}
.rrf-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:9px}
.rrf-stars{display:flex;align-items:center;gap:1px;margin-bottom:11px}
.rrf-star{font-size:22px;color:var(--rule);background:none;border:none;cursor:pointer;padding:0 2px;
  transition:color .1s,transform .1s;line-height:1;font-family:inherit}
.rrf-star.lit{color:var(--gold)}
.rrf-star:hover{transform:scale(1.15)}
.rrf-sel-label{font-size:12px;color:var(--ink-soft);margin-left:6px}
.rrf-text{width:100%;border:1px solid var(--rule);background:var(--paper);border-radius:9px;
  padding:9px 11px;font-family:var(--sans);font-size:13px;color:var(--ink);resize:none;
  outline:none;transition:border-color .2s;margin-bottom:9px;display:block}
.rrf-text:focus{border-color:var(--teal)}
.rrf-submit{width:100%;padding:10px;background:var(--ink);color:var(--paper-3);border-radius:10px;
  font-size:13px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s;font-family:var(--sans)}
.rrf-submit:hover:not(:disabled){opacity:.82}
.rrf-submit:disabled{opacity:.4;cursor:not-allowed}
.rr-thanks{font-size:13px;color:var(--teal);padding:10px 0;font-style:italic}

/* Skeletons */
.skel-box{background:var(--paper-2)}
.skel .skel-line{height:11px;border-radius:6px;margin-bottom:9px;
  background:linear-gradient(90deg,var(--paper-2) 25%,var(--rule-soft) 50%,var(--paper-2) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite}
.skel-line.w35{width:35%}.skel-line.w50{width:50%}.skel-line.w60{width:60%}.skel-line.w80{width:80%}
.thumb.skel-box{animation:shimmer 1.4s infinite;background:linear-gradient(90deg,var(--paper-2) 25%,var(--rule-soft) 50%,var(--paper-2) 75%);background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
